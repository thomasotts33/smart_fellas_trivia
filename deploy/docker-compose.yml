services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartfellas
      POSTGRES_USER: smartfellas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfellas -d smartfellas"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - smartfellas_postgres:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${TAILSCALE_IP}:4000:4000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "${TAILSCALE_IP}:3000:3000"

volumes:
  smartfellas_postgres:
